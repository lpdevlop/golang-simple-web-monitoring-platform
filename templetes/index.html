<!DOCTYPE html>
<html>
<head>
    <title>Web Monitor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #aac3df;
            color: white;
        }

        .green { color: green; }
        .red { color: red; }
        .gray { color: rgb(10, 0, 88); }
    </style>
</head>

<body>

<div class="container">

    <h2>Web Monitoring Table</h2>

    <form method="POST" action="/monitor">
        <input type="text" name="url" placeholder="Enter URL" style="width:70%;padding:10px;">
        <button type="submit" style="padding:10px;">Check</button>
    </form>

    <table>
        <tr>
            <th>Url</th>
            <th>Time</th>
            <th>Title Change</th>
            <th>Body Change</th>
        </tr>

        {{range .Records}}
        <tr>
            <td>{{.Url}}<br></td>

            <td>{{.Time}}<br></td>

            <td class="{{.TitleChange}}">
                {{.TitleChange}}%
            </td>

            <td class="{{.BodyChange}}">
                {{.BodyChange}}%
            </td>
        </tr>
        {{end}}

    </table>

</div>

</body>
</html>
